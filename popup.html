<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Debate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Mesa Redonda <span>AI</span></h1>
            <button id="clearBtn" title="Limpar Histórico" class="icon-btn">
                <svg viewBox="0 0 24 24" width="18" height="18">
                    <path fill="currentColor" d="M9 3v1H4v2h1v13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6h1V4h-5V3H9m2 7h2v7h-2v-7m-4 0h2v7H7v-7z"></path>
                </svg>
            </button>
        </header>

        <section class="status-panel">
            <div class="llm-status" id="llm-a">
                <div class="dot"></div>
                <span class="label">Perplexity</span>
            </div>
            <div class="llm-status" id="llm-b">
                <div class="dot"></div>
                <span class="label">Gemini</span>
            </div>
            <div class="llm-status" id="llm-c">
                <div class="dot"></div>
                <span class="label">ChatGPT</span>
            </div>
        </section>

        <main>
            <div class="chat-display" id="chatDisplay">
                <div class="system-message">Aguardando proposição...</div>
            </div>
        </main>

        <footer>
            <div class="input-group">
                <textarea id="userInput" placeholder="Qual o tema do debate?"></textarea>
                <button id="startBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
